<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registreren</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .formulier {
      background: #fff;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    h1 {
      margin-top: 0;
      font-size: 1.5rem;
      color: #333;
    }
    label {
      display: block;
      margin-bottom: 0.25rem;
      font-size: 0.9rem;
      color: #555;
    }
    input {
      width: 100%;
      padding: 0.5rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 1rem;
    }
    input:focus {
      outline: none;
      border-color: #0066cc;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      background: #0066cc;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover {
      background: #0052a3;
    }
    .inloggen {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
    .inloggen a {
      color: #0066cc;
      text-decoration: none;
    }
    .inloggen a:hover {
      text-decoration: underline;
    }
    .melding {
      padding: 0.75rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
    .melding.succes { background: #e6f4ea; color: #1e6e3a; display: block; }
    .melding.fout   { background: #fdecea; color: #b00020; display: block; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="formulier">
    <h1>Account aanmaken</h1>
    <div id="melding" class="melding"></div>
    <form id="registreer-form">
      <label for="voornaam">Voornaam</label>
      <input type="text" id="voornaam" name="voornaam" placeholder="Jan" required>

      <label for="achternaam">Achternaam</label>
      <input type="text" id="achternaam" name="achternaam" placeholder="de Vries" required>

      <label for="email">E-mailadres</label>
      <input type="email" id="email" name="email" placeholder="jan@voorbeeld.nl" required>

      <label for="wachtwoord">Wachtwoord</label>
      <input type="password" id="wachtwoord" name="wachtwoord" placeholder="Minimaal 8 tekens" minlength="8" required>

      <label for="bevestig">Wachtwoord bevestigen</label>
      <input type="password" id="bevestig" name="bevestig" placeholder="Herhaal uw wachtwoord" required>

      <button type="submit" id="submit-btn">Registreren</button>
    </form>
    <div class="inloggen">
      Al een account? <a href="inloggen.html">Inloggen</a>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabase = createClient(
      'https://vzfysqedzlkyqviwkbuw.supabase.co',
      'sb_publishable_0NbfNpK8qzE6Ec5IEqmrJg_0wLvnTp4'
    );

    document.getElementById('registreer-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const melding = document.getElementById('melding');
      const btn = document.getElementById('submit-btn');
      melding.className = 'melding';
      melding.textContent = '';

      const voornaam = document.getElementById('voornaam').value.trim();
      const achternaam = document.getElementById('achternaam').value.trim();
      const email = document.getElementById('email').value.trim();
      const wachtwoord = document.getElementById('wachtwoord').value;
      const bevestig = document.getElementById('bevestig').value;

      if (wachtwoord !== bevestig) {
        melding.textContent = 'Wachtwoorden komen niet overeen.';
        melding.className = 'melding fout';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Bezig…';

      const { error } = await supabase.auth.signUp({
        email,
        password: wachtwoord,
        options: {
          data: { voornaam, achternaam }
        }
      });

      btn.disabled = false;
      btn.textContent = 'Registreren';

      if (error) {
        melding.textContent = error.message;
        melding.className = 'melding fout';
      } else {
        melding.textContent = 'Gelukt! Controleer uw e-mail om uw account te bevestigen.';
        melding.className = 'melding succes';
        document.getElementById('registreer-form').reset();
      }
    });
  </script>
</body>
</html>
