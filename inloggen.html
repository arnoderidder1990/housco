<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inloggen – Housco</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .formulier {
      background: #fff;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    h1 {
      margin-top: 0;
      font-size: 1.5rem;
      color: #333;
    }
    label {
      display: block;
      margin-bottom: 0.25rem;
      font-size: 0.9rem;
      color: #555;
    }
    input {
      width: 100%;
      padding: 0.5rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 1rem;
    }
    input:focus {
      outline: none;
      border-color: #0066cc;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      background: #0066cc;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #0052a3; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .melding {
      padding: 0.75rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
    .melding.fout { background: #fdecea; color: #b00020; display: block; }
    .onderaan {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
    .onderaan a {
      color: #0066cc;
      text-decoration: none;
    }
    .onderaan a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="formulier">
    <h1>Inloggen</h1>
    <div id="melding" class="melding"></div>
    <form id="inlog-form">
      <label for="email">E-mailadres</label>
      <input type="email" id="email" name="email" placeholder="jan@voorbeeld.nl" required>

      <label for="wachtwoord">Wachtwoord</label>
      <input type="password" id="wachtwoord" name="wachtwoord" placeholder="Uw wachtwoord" required>

      <button type="submit" id="submit-btn">Inloggen</button>
    </form>
    <div class="onderaan">
      Nog geen account? <a href="registreren.html">Registreren</a>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabase = createClient(
      'https://vzfysqedzlkyqviwkbuw.supabase.co',
      'sb_publishable_0NbfNpK8qzE6Ec5IEqmrJg_0wLvnTp4'
    );

    document.getElementById('inlog-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const melding = document.getElementById('melding');
      const btn = document.getElementById('submit-btn');
      melding.className = 'melding';
      melding.textContent = '';

      const email = document.getElementById('email').value.trim();
      const wachtwoord = document.getElementById('wachtwoord').value;

      btn.disabled = true;
      btn.textContent = 'Bezig…';

      const { error } = await supabase.auth.signInWithPassword({ email, password: wachtwoord });

      btn.disabled = false;
      btn.textContent = 'Inloggen';

      if (error) {
        melding.textContent = error.message;
        melding.className = 'melding fout';
      } else {
        window.location.href = 'profiel.html';
      }
    });
  </script>
</body>
</html>
